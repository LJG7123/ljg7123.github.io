<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Todo List</title>
        <link rel="stylesheet" href="./css/App.css" />
        <link rel="stylesheet" href="./css/Header.css" />
        <link rel="stylesheet" href="./css/Editor.css" />
        <link rel="stylesheet" href="./css/List.css" />
        <link rel="stylesheet" href="./css/TodoItem.css" />
    </head>
    <body>
        <div class="App">
            <div class="Header">
                <h3>오늘의 Plan 📝</h3>
                <h1>2026-04-04</h1>
            </div>
            <form>
                <div class="Editor">
                    <input type="text" id="input" placeholder="새로운 todo" />
                    <button>추가</button>
                </div>
            </form>
            <div class="List">
                <h4></h4>
                <input type="text" id="keyword" />
                <div class="todos_wrapper">
                    <div class="TodoItem">
                        <input type="checkbox" />
                        <div class="content">친구랑 점심먹기</div>
                        <div class="date">2025-03-20</div>
                        <button onclick="">삭제</button>
                    </div>
                    <div class="TodoItem">
                        <input type="checkbox" />
                        <div class="content">저녁에 숙제하기</div>
                        <div class="date">2025-03-21</div>
                        <button onClick>삭제</button>
                    </div>
                    <div class="TodoItem">
                        <input type="checkbox" />
                        <div class="content">잠자기전에 일기쓰기</div>
                        <div class="date">2025-03-22</div>
                        <button onClick>삭제</button>
                    </div>
                </div>
            </div>
        </div>
    </body>
    <script src="./js/todoList.js"></script>
</html>
